<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7F52FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C811E2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- K -->
  <text x="28" y="145" font-family="JetBrains Mono, Fira Code, monospace" font-weight="900" font-size="120" fill="white" letter-spacing="-5">K</text>
  <!-- A -->
  <text x="88" y="145" font-family="JetBrains Mono, Fira Code, monospace" font-weight="900" font-size="120" fill="rgba(255,255,255,0.85)" letter-spacing="-5">A</text>
  <!-- P -->
  <text x="148" y="145" font-family="JetBrains Mono, Fira Code, monospace" font-weight="900" font-size="120" fill="rgba(255,255,255,0.7)" letter-spacing="-5">P</text>
  <!-- Parallel lines accent -->
  <line x1="20" y1="170" x2="70" y2="170" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="170" x2="120" y2="170" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="170" x2="180" y2="170" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
</svg>
