name: Publish to Maven Central

on:
  release:
    types: [released]

permissions:
  contents: read

jobs:

  # ── Pre-publish validation ───────────────────────────────────────────────
  validate:
    name: Pre-publish · ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - check: Version consistency
            script: |
              VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
              TAG="${GITHUB_REF_NAME}"
              EXPECTED="v${VERSION}"
              echo "build.gradle.kts version: $VERSION"
              echo "Release tag:              $TAG"
              echo "Expected tag:             $EXPECTED"
              if [ "$TAG" != "$EXPECTED" ]; then
                echo "::error::Version mismatch: build.gradle.kts has $VERSION but release tag is $TAG (expected $EXPECTED)"
                exit 1
              fi
              echo "Version matches."
          - check: Not already published
            script: |
              VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
              for MODULE in kap-core kap-resilience kap-arrow; do
                URL="https://repo1.maven.org/maven2/io/github/damian-rafael-lattenero/$MODULE/$VERSION/$MODULE-$VERSION.pom"
                if curl -sf "$URL" > /dev/null 2>&1; then
                  echo "::error::$MODULE $VERSION already exists on Maven Central. Bump the version before publishing."
                  exit 1
                fi
                echo "$MODULE $VERSION not found on Maven Central (OK)."
              done
    steps:
      - uses: actions/checkout@v6
      - name: ${{ matrix.check }}
        run: ${{ matrix.script }}

  test:
    name: Pre-publish · Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Run all tests
        run: |
          ./gradlew :kap-core:jvmTest \
                    :kap-resilience:jvmTest \
                    :kap-arrow:test \
                    :benchmarks:test
      - name: Verify multiplatform compilation
        run: ./gradlew compileKotlinJs compileKotlinLinuxX64
      - name: Verify codegen is up-to-date
        run: |
          ./gradlew :kap-core:generateAll \
                    :kap-resilience:generateResourceZip \
                    :kap-arrow:generateValidatedOverloads
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Generated code is out of date."
            exit 1
          fi

  # ── Publish (macOS for Apple targets) ────────────────────────────────────
  publish:
    name: Publish
    needs: test
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

  # ── Post-publish verification ────────────────────────────────────────────
  verify:
    name: Post-publish · Verify
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5

      # Central often surfaces artifacts at different times; waiting only for kap-core
      # caused false failures when kap-resilience/kap-arrow lagged by minutes.
      - name: Wait for Maven Central sync (all modules)
        run: |
          VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          BASE="https://repo1.maven.org/maven2/io/github/damian-rafael-lattenero"
          MODULES="kap-core kap-resilience kap-arrow"
          MAX_ATTEMPTS=40
          INTERVAL=60

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            MISSING=""
            for MODULE in $MODULES; do
              URL="$BASE/$MODULE/$VERSION/$MODULE-$VERSION.pom"
              if ! curl -sf "$URL" > /dev/null 2>&1; then
                MISSING="$MISSING $MODULE"
              fi
            done
            if [ -z "$MISSING" ]; then
              echo "All modules $VERSION available on Maven Central (attempt $i/$MAX_ATTEMPTS)."
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS — still missing:$MISSING — waiting ${INTERVAL}s..."
            sleep "$INTERVAL"
          done

          MISSING=""
          for MODULE in $MODULES; do
            URL="$BASE/$MODULE/$VERSION/$MODULE-$VERSION.pom"
            if ! curl -sf "$URL" > /dev/null 2>&1; then
              MISSING="$MISSING $MODULE"
            fi
          done
          echo "::error::Timeout: not all artifacts visible on repo1.maven.org after $((MAX_ATTEMPTS * INTERVAL / 60)) minutes. Missing:$MISSING"
          exit 1

      - name: Verify all modules are resolvable
        run: |
          VERSION=$(grep '^version' build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          for MODULE in kap-core kap-resilience kap-arrow; do
            URL="https://repo1.maven.org/maven2/io/github/damian-rafael-lattenero/$MODULE/$VERSION/$MODULE-$VERSION.pom"
            if ! curl -sf "$URL" > /dev/null 2>&1; then
              echo "::error::$MODULE $VERSION NOT found on Maven Central after publish."
              exit 1
            fi
            echo "$MODULE $VERSION verified on Maven Central."
          done
