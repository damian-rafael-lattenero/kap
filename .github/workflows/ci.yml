name: CI

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  mock-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create mock JMH results
        run: |
          mkdir -p benchmarks/build/results/jmh
          cat > benchmarks/build/results/jmh/results.json << 'MOCK'
          [{"jmhVersion":"1.37","benchmark":"applicative.benchmarks.CoreBenchmark.kap_pure","mode":"avgt","threads":1,"forks":1,"jvm":"21","jvmArgs":[],"warmupIterations":1,"warmupTime":"1 s","measurementIterations":1,"measurementTime":"1 s","primaryMetric":{"score":42.0,"scoreError":1.0,"scoreConfidence":[41.0,43.0],"scorePercentiles":{"50.0":42.0},"scoreUnit":"ns/op","rawData":[[42.0]]}}]
          MOCK

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: KAP JMH Benchmarks
          tool: jmh
          output-file-path: benchmarks/build/results/jmh/results.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks
          auto-push: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@damian-rafael-lattenero"
