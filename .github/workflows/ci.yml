name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Run JVM tests
        run: ./gradlew jvmTest
      - name: Verify JS compilation
        run: ./gradlew compileKotlinJs
      - name: Verify Native compilation
        run: ./gradlew compileKotlinLinuxX64
