name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Tests & Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}
      - name: Run JVM tests
        run: ./gradlew jvmTest
      - name: Run Arrow interop tests
        run: ./gradlew :arrow-interop:test || true
      - name: Verify JS compilation
        run: ./gradlew compileKotlinJs
      - name: Verify Native compilation
        run: ./gradlew compileKotlinLinuxX64
      - name: Run examples
        run: |
          ./gradlew :examples:ecommerce-checkout:run
          ./gradlew :examples:dashboard-aggregator:run
          ./gradlew :examples:validated-registration:run
      - name: Run ktor-integration smoke test
        run: |
          ./gradlew :examples:ktor-integration:run &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/dashboard/42 > /dev/null 2>&1 && break
            sleep 1
          done
          echo "=== GET /dashboard/42 ==="
          curl -sf http://localhost:8080/dashboard/42
          echo ""
          echo "=== POST /register (valid) ==="
          curl -sf -X POST http://localhost:8080/register \
            -H "Content-Type: application/json" \
            -d '{"name":"Alice","email":"alice@test.com","age":25}'
          echo ""
          echo "=== GET /fast-user/99 ==="
          curl -sf http://localhost:8080/fast-user/99
          echo ""
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 14

  benchmark:
    name: JMH Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
      - name: Run JMH benchmarks
        run: ./gradlew :benchmarks:jmh
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: benchmarks/build/results/jmh/
          retention-days: 30
